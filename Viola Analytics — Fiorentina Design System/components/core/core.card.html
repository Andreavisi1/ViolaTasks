<!-- @dsCard group="Components" viewport="700x430" name="Core — Button, Badge, Card, Tooltip" subtitle="Primitives used across the dashboard." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-page); padding: 22px; color: var(--text-primary); }
  .group { margin-bottom: 20px; }
  .lbl { font: var(--fw-bold) var(--text-2xs) var(--font-body); letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
  .rowf { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, Badge, Card, Tooltip, InfoDot } = window.ViolaAnalyticsFiorentinaDesignSystem_48fef3;
    function Demo() {
      return (
        <div>
          <div className="group">
            <div className="lbl">Button — variants &amp; sizes</div>
            <div className="rowf">
              <Button variant="primary">Ricalcola</Button>
              <Button variant="secondary" iconLeft="↑">Carica CSV</Button>
              <Button variant="ghost">Reset filtri</Button>
              <Button variant="danger" size="sm">Rimuovi</Button>
              <Button variant="primary" size="lg">Analizza</Button>
              <Button variant="primary" disabled>Disabled</Button>
            </div>
          </div>
          <div className="group">
            <div className="lbl">Badge — status &amp; events</div>
            <div className="rowf">
              <Badge tone="positive">+2.6 sopra xG</Badge>
              <Badge tone="danger">-0.9 sotto xG</Badge>
              <Badge tone="viola" dot>Titolare</Badge>
              <Badge tone="accent">Top scorer</Badge>
              <Badge tone="event" eventType="pass">Passaggio</Badge>
              <Badge tone="event" eventType="shot">Tiro</Badge>
              <Badge tone="event" eventType="tackle">Contrasto</Badge>
              <Badge tone="event" eventType="dribble">Dribbling</Badge>
            </div>
          </div>
          <div className="group">
            <div className="lbl">Tooltip + InfoDot</div>
            <div className="rowf" style={{ paddingTop: 8 }}>
              <span style={{ fontWeight: 600 }}>
                xG <InfoDot label="Gol attesi: stima della qualità dei tiri. Gol − xG dice se finalizza sopra le attese." />
              </span>
              <Tooltip label="Divide i conteggi per i minuti × 90 — confronta titolari e subentrati a parità di tempo." side="bottom">
                <Badge tone="neutral" dot>Normalizza /90′</Badge>
              </Tooltip>
            </div>
          </div>
          <Card eyebrow="Sezione 1" title="Classifica giocatori"
                actions={<Button size="sm" variant="ghost">Esporta</Button>}
                style={{ maxWidth: 420 }}>
            <div style={{ fontSize: 'var(--text-sm)', color: 'var(--text-secondary)' }}>
              Contenuto del pannello — grafico a barre + tabella ordinata.
            </div>
          </Card>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
