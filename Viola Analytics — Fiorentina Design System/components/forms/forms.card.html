<!-- @dsCard group="Components" viewport="700x420" name="Forms — Select, Slider, Switch, MetricSelector" subtitle="Filter-bar controls. Populated from CSV-derived values." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-page); padding: 22px; color: var(--text-primary); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 24px; max-width: 620px; }
  .full { grid-column: 1 / -1; }
  .lbl { font: var(--fw-bold) var(--text-2xs) var(--font-body); letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Select, Slider, Switch, MetricSelector } = window.ViolaAnalyticsFiorentinaDesignSystem_48fef3;
    function Demo() {
      const [comp, setComp] = React.useState(['Serie A']);
      const [player, setPlayer] = React.useState('R. Sottil');
      const [topN, setTopN] = React.useState(10);
      const [mins, setMins] = React.useState(450);
      const [per90, setPer90] = React.useState(true);
      const [metric, setMetric] = React.useState('xg');
      return (
        <div className="grid">
          <div>
            <div className="lbl">Select — multi</div>
            <Select label="Competizione" multi value={comp} onChange={setComp}
              options={['Serie A', 'Coppa Italia', 'Conference League']} />
          </div>
          <div>
            <div className="lbl">Select — single</div>
            <Select label="Giocatore" value={player} onChange={setPlayer}
              options={['R. Sottil', 'N. González', 'G. Bonaventura', 'A. Cabral']} />
          </div>
          <div>
            <div className="lbl">Slider</div>
            <Slider label="Top N" value={topN} onChange={setTopN} min={3} max={25} />
            <div style={{ height: 14 }} />
            <Slider label="Minuti minimi" value={mins} onChange={setMins} min={0} max={3000} step={90} suffix="′" />
          </div>
          <div>
            <div className="lbl">Switch</div>
            <Switch checked={per90} onChange={setPer90} label="Normalizza per 90′"
              hint="Divide i conteggi per i minuti × 90. Le % non si normalizzano." />
          </div>
          <div className="full">
            <div className="lbl">MetricSelector</div>
            <MetricSelector value={metric} onChange={setMetric} options={[
              { value: 'goals', label: 'Gol' }, { value: 'xg', label: 'xG' },
              { value: 'g_xg', label: 'Gol − xG' }, { value: 'shots', label: 'Tiri' },
              { value: 'pass_pct', label: '% passaggi' }, { value: 'tackle_pct', label: '% contrasti' },
              { value: 'dribbles', label: 'Dribbling' },
            ]} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
