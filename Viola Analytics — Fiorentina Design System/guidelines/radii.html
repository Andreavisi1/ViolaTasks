<!-- @dsCard group="Spacing" viewport="700x170" name="Radii" subtitle="Controls & cards default to --radius-md (10px). Pills for chips/filters." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 24px; }
  .row { display:flex; gap:18px; align-items:flex-end; }
  .item { text-align:center; }
  .box { width:78px; height:60px; background: var(--viola-100); border:2px solid var(--viola-500); }
  .name { font: var(--fw-medium) 11px var(--font-mono); color: var(--text-secondary); margin-top:8px; }
  .px { font: 10px var(--font-mono); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row" id="row"></div>
  <script>
    const root = getComputedStyle(document.documentElement);
    const items = ['xs','sm','md','lg','xl','2xl','pill'];
    document.getElementById('row').innerHTML = items.map(k=>{
      const v = root.getPropertyValue('--radius-'+k).trim();
      return `<div class="item"><div class="box" style="border-radius:${v}"></div><div class="name">${k}</div><div class="px">${v}</div></div>`;
    }).join('');
  </script>
</body>
</html>
