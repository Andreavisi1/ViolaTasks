<!-- @dsCard group="Type" viewport="700x230" name="Display — Space Grotesk" subtitle="Headings, scoreboard numerals. Tight tracking, sporty geometric." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-display); background: var(--surface-card); padding: 24px; color: var(--text-primary); }
  .big { font-weight: 700; font-size: 56px; line-height: var(--lh-tight); letter-spacing: var(--ls-tight); }
  .big .accent { color: var(--accent-600); }
  .h1 { font-weight: 700; font-size: 28px; letter-spacing: var(--ls-tight); margin-top: 14px; }
  .row { display:flex; gap:28px; margin-top:18px; align-items:baseline; }
  .row b { font-weight:700; font-size:48px; letter-spacing:var(--ls-tight); font-feature-settings:'tnum' 1; }
  .meta { font: var(--fw-regular) var(--text-xs) var(--font-mono); color: var(--text-muted); margin-top:14px; }
</style>
</head>
<body>
  <div class="big">Forza <span class="accent">Viola</span></div>
  <div class="h1">Match Analysis — Serie A 2025/26</div>
  <div class="row">
    <b>3.42</b><b>78%</b><b>+1.9</b>
  </div>
  <div class="meta">Space Grotesk · 400 / 500 / 600 / 700 · tabular figures on for stats</div>
</body>
</html>
