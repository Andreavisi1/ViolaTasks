<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="11 → 64px ramp with role mapping." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 20px 24px; color: var(--text-primary); }
  .r { display:flex; align-items:baseline; gap:16px; padding:5px 0; border-bottom:1px dashed var(--border-subtle); }
  .r:last-child { border-bottom:0; }
  .name { width:120px; flex:none; font: var(--fw-medium) 11px var(--font-mono); color: var(--text-muted); }
  .spec { width:120px; flex:none; font: 11px var(--font-mono); color: var(--accent-600); }
  .demo { font-family: var(--font-display); font-weight: 600; letter-spacing: var(--ls-tight); color: var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
</style>
</head>
<body>
  <div id="rows"></div>
  <script>
    const rows = [
      ['--text-4xl','48px','Display stat','48px'],
      ['--text-3xl','36px','KPI value','36px'],
      ['--text-2xl','28px','Page heading','28px'],
      ['--text-xl','22px','Section heading','22px'],
      ['--text-lg','18px','Card title','18px'],
      ['--text-base','15px','Body default','15px'],
      ['--text-sm','13px','Secondary UI','13px'],
      ['--text-xs','12px','Caption / meta','12px'],
      ['--text-2xs','11px','Micro label','11px'],
    ];
    document.getElementById('rows').innerHTML = rows.map(([tok,px,role,size]) =>
      `<div class="r"><div class="name">${tok}</div><div class="spec">${px}</div><div class="demo" style="font-size:${size}">${role}</div></div>`
    ).join('');
  </script>
</body>
</html>
