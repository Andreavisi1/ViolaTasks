<!-- @dsCard group="Colors" viewport="700x180" name="Viola — brand ramp" subtitle="The purple. --viola-700 is the primary brand value." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 20px; }
  .row { display: flex; gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 96px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; }
  .sw span { font: var(--fw-semibold) var(--text-2xs)/1.3 var(--font-mono); letter-spacing: .02em; }
  .sw small { font: var(--fw-regular) 10px var(--font-mono); opacity: .8; }
  .lab { margin-top: 12px; font: var(--fw-medium) var(--text-xs) var(--font-body); color: var(--text-secondary); }
  .dot { display:inline-block; width:8px;height:8px;border-radius:2px;background:var(--viola-700); margin-right:6px; vertical-align:middle;}
</style>
</head>
<body>
  <div class="row" id="row"></div>
  <div class="lab"><span class="dot"></span>Primary brand = <b style="color:var(--text-primary)">--viola-700</b> · official viola = --viola-600 · crest fill = --viola-500</div>
  <script>
    const steps = [50,100,200,300,400,500,600,700,800,900,950];
    const root = getComputedStyle(document.documentElement);
    document.getElementById('row').innerHTML = steps.map(s => {
      const v = root.getPropertyValue('--viola-'+s).trim();
      const dark = s >= 400;
      return `<div class="sw" style="background:${v};color:${dark?'#fff':'#240E3D'}"><span>${s}</span><small>${v}</small></div>`;
    }).join('');
  </script>
</body>
</html>
