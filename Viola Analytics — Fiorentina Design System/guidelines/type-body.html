<!-- @dsCard group="Type" viewport="700x230" name="Body — Hanken Grotesk" subtitle="UI text, captions, tooltips. Calm, legible, slightly humanist." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); padding: 24px; color: var(--text-primary); max-width: 620px; }
  .eyebrow { font: var(--fw-bold) var(--text-2xs) var(--font-body); letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--text-brand); }
  .lead { font-size: var(--text-lg); font-weight: 600; margin: 6px 0 8px; }
  p { font-size: var(--text-base); line-height: var(--lh-normal); color: var(--text-secondary); margin: 0 0 10px; }
  .cap { font-size: var(--text-xs); color: var(--text-muted); }
  b { color: var(--text-primary); }
</style>
</head>
<body>
  <div class="eyebrow">xG · expected goals</div>
  <div class="lead">Stima dei gol attesi data la qualità dei tiri.</div>
  <p>Il valore <b>Gol − xG</b> dice se un giocatore finalizza sopra o sotto le attese. Normalizzare “per 90′” mette titolari e subentrati a confronto a parità di tempo in campo.</p>
  <div class="cap">Caption / didascalia — Hanken Grotesk 400 · 13px · --text-muted</div>
</body>
</html>
