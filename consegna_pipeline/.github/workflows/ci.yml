name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Il progetto vive nella sottocartella consegna_pipeline della repo.
defaults:
  run:
    working-directory: consegna_pipeline

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Tests
        run: python -m pytest -q
