<!DOCTYPE html><html lang="it"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Viola Analytics — Match Analysis</title>
<style>/* ============================================================
   Viola Analytics — Webfonts
   Substitution note: brand uses Google Fonts as the licensed
   stand-ins for a bespoke sporty-grotesk pairing.
   - Space Grotesk  → display / headings / scoreboard numerals
   - Hanken Grotesk → body / UI text
   - IBM Plex Mono  → data, tabular figures, code & engineer chrome
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

/* ============================================================
   Viola Analytics — Color tokens
   Brand: ACF Fiorentina (viola + giglio red), match-analysis context.
   Base palette + semantic aliases. Light-first, viola-forward.
   ============================================================ */
:root {
  /* ---- Brand: Viola (the purple) ---------------------------- */
  --viola-50:  #F8F4FC;
  --viola-100: #F0E6F8;
  --viola-200: #DFC9EE;
  --viola-300: #C39BDF;
  --viola-400: #A066C9;
  --viola-500: #7E3FA0;   /* crest fill */
  --viola-600: #5C2D91;   /* official Fiorentina viola */
  --viola-700: #4A2078;   /* primary brand */
  --viola-800: #361659;
  --viola-900: #240E3D;
  --viola-950: #170828;   /* deepest, near-black violet */

  /* ---- Brand: Giglio (Florentine lily red) ----------------- */
  --giglio-100: #FCE3E2;
  --giglio-300: #F4908B;
  --giglio-500: #E8332C;  /* the fleur-de-lis red */
  --giglio-600: #CC241F;
  --giglio-700: #A31A17;

  /* ---- Accent: luminous data violet (key numbers) ---------- */
  --accent-300: #D8A9FF;
  --accent-400: #B96BFF;
  --accent-500: #A24BE0;  /* highlight / key stat pop */
  --accent-600: #8B2FCC;

  /* ---- Pitch greens (the field) ---------------------------- */
  --pitch-50:  #EAF4EE;
  --pitch-300: #6FBF8E;
  --pitch-500: #2E8B57;
  --pitch-600: #1F6B3F;
  --pitch-700: #14532D;
  --pitch-900: #0C2E1A;
  --pitch-grass-a: #2C7A48;  /* mowing stripe A */
  --pitch-grass-b: #31864F;  /* mowing stripe B */
  --pitch-line:    rgba(255, 255, 255, 0.78);

  /* ---- Neutrals (cool gray, faint violet tint) ------------- */
  --gray-50:  #F8F7FB;
  --gray-100: #F1EFF6;
  --gray-200: #E4E0EC;
  --gray-300: #C9C3D6;
  --gray-400: #9F98B0;
  --gray-500: #756C8C;
  --gray-600: #564E6B;
  --gray-700: #3D3650;
  --gray-800: #2A2438;
  --gray-900: #1A1626;
  --gray-950: #110E1A;
  --white: #FFFFFF;
  --black: #000000;

  /* ---- Event-type categorical palette (pitch map / legends) - */
  --ev-pass:    #3B82F6;  /* blue   */
  --ev-shot:    #E8332C;  /* giglio red */
  --ev-tackle:  #F59E0B;  /* amber  */
  --ev-dribble: #14B8A6;  /* teal   */
  --ev-foul:    #94A3B8;  /* slate  */

  /* ---- Status / feedback ----------------------------------- */
  --positive-500: #15A862;  /* over-performing / won */
  --positive-100: #DCF3E8;
  --warning-500:  #E59500;
  --warning-100:  #FBEED2;
  --danger-500:   #DD2E25;
  --danger-100:   #FBE0DE;
  --info-500:     var(--viola-600);
  --info-100:     var(--viola-100);

  /* ============================================================
     SEMANTIC ALIASES — author against these
     ============================================================ */
  --brand:            var(--viola-700);
  --brand-strong:     var(--viola-800);
  --brand-soft:       var(--viola-100);
  --brand-contrast:   var(--white);
  --accent:           var(--accent-500);   /* key numbers / highlights */
  --accent-soft:      #F3E6FB;

  /* surfaces */
  --surface-page:    #F6F4FA;   /* app background */
  --surface-card:    var(--white);
  --surface-raised:  var(--white);
  --surface-sunken:  var(--gray-100);
  --surface-inverse: var(--viola-900);
  --surface-brand:   var(--viola-700);
  --surface-overlay: rgba(23, 8, 40, 0.55);

  /* text */
  --text-primary:   var(--gray-900);
  --text-secondary: var(--gray-600);
  --text-muted:     var(--gray-400);
  --text-inverse:   var(--white);
  --text-brand:     var(--viola-700);
  --text-accent:    var(--accent-600);
  --text-link:      var(--viola-600);

  /* borders */
  --border-subtle:  var(--gray-200);
  --border-default: var(--gray-300);
  --border-strong:  var(--gray-400);
  --border-brand:   var(--viola-300);
  --ring-focus:     rgba(124, 63, 160, 0.35);  /* viola focus ring */
}

/* ============================================================
   Viola Analytics — Typography tokens
   Display: Space Grotesk · Body/UI: Hanken Grotesk · Data: IBM Plex Mono
   ============================================================ */
:root {
  /* ---- Families ------------------------------------------- */
  --font-display: 'Space Grotesk', 'Hanken Grotesk', system-ui, sans-serif;
  --font-body:    'Hanken Grotesk', system-ui, -apple-system, sans-serif;
  --font-mono:    'IBM Plex Mono', ui-monospace, 'SFMono-Regular', monospace;
  /* tabular figures for stats: pair --font-mono OR body with font-feature-settings */
  --font-data:    'IBM Plex Mono', ui-monospace, monospace;

  /* ---- Type scale (rem, 16px base) ------------------------- */
  --text-2xs:  0.6875rem;  /* 11px — micro labels, legends   */
  --text-xs:   0.75rem;    /* 12px — captions, table meta    */
  --text-sm:   0.8125rem;  /* 13px — secondary UI            */
  --text-base: 0.9375rem;  /* 15px — body default            */
  --text-md:   1rem;       /* 16px                           */
  --text-lg:   1.125rem;   /* 18px — card titles             */
  --text-xl:   1.375rem;   /* 22px — section headings        */
  --text-2xl:  1.75rem;    /* 28px — page headings           */
  --text-3xl:  2.25rem;    /* 36px — KPI values              */
  --text-4xl:  3rem;       /* 48px — scoreboard / hero stat  */
  --text-5xl:  4rem;       /* 64px — display                 */

  /* ---- Weights -------------------------------------------- */
  --fw-regular:  400; /* @kind other */
  --fw-medium:   500; /* @kind other */
  --fw-semibold: 600; /* @kind other */
  --fw-bold:     700; /* @kind other */
  --fw-black:    800; /* @kind other */

  /* ---- Line heights --------------------------------------- */
  --lh-tight:   1.05; /* @kind other */
  --lh-snug:    1.2;  /* @kind other */
  --lh-normal:  1.45; /* @kind other */
  --lh-relaxed: 1.6;  /* @kind other */

  /* ---- Letter spacing ------------------------------------- */
  --ls-tight:   -0.02em; /* @kind other */
  --ls-normal:  0;       /* @kind other */
  --ls-wide:    0.04em;  /* @kind other */
  /* --ls-caps: eyebrow / overline uppercase */
  --ls-caps:    0.08em;  /* @kind other */

  /* ---- Semantic roles ------------------------------------- */
  --type-display:  var(--fw-bold) var(--text-5xl)/var(--lh-tight) var(--font-display); /* @kind other */
  --type-h1:       var(--fw-bold) var(--text-2xl)/var(--lh-snug) var(--font-display); /* @kind other */
  --type-h2:       var(--fw-semibold) var(--text-xl)/var(--lh-snug) var(--font-display); /* @kind other */
  --type-card-title: var(--fw-semibold) var(--text-lg)/var(--lh-snug) var(--font-display); /* @kind other */
  --type-body:     var(--fw-regular) var(--text-base)/var(--lh-normal) var(--font-body); /* @kind other */
  --type-kpi:      var(--fw-bold) var(--text-3xl)/var(--lh-tight) var(--font-display); /* @kind other */
  --type-mono:     var(--fw-regular) var(--text-sm)/var(--lh-normal) var(--font-mono); /* @kind other */
}

/* tabular numerals helper — apply to any stat run */
.tnum { font-feature-settings: 'tnum' 1, 'zero' 1; font-variant-numeric: tabular-nums; }

/* ============================================================
   Viola Analytics — Spacing, radii, sizing
   4px base grid.
   ============================================================ */
:root {
  --space-0:   0;
  --space-1:   0.25rem;  /* 4  */
  --space-2:   0.5rem;   /* 8  */
  --space-3:   0.75rem;  /* 12 */
  --space-4:   1rem;     /* 16 */
  --space-5:   1.25rem;  /* 20 */
  --space-6:   1.5rem;   /* 24 */
  --space-8:   2rem;     /* 32 */
  --space-10:  2.5rem;   /* 40 */
  --space-12:  3rem;     /* 48 */
  --space-16:  4rem;     /* 64 */

  /* ---- Radii ---------------------------------------------- */
  --radius-xs:   4px;
  --radius-sm:   6px;
  --radius-md:   10px;   /* default control / card */
  --radius-lg:   14px;
  --radius-xl:   20px;
  --radius-2xl:  28px;
  --radius-pill: 999px;

  /* ---- Control sizing ------------------------------------- */
  --control-h-sm: 30px;
  --control-h-md: 38px;
  --control-h-lg: 46px;

  /* ---- Layout -------------------------------------------- */
  --sidebar-w:    264px;
  --container-max: 1320px;
  --grid-gutter:  var(--space-6);
}

/* ============================================================
   Viola Analytics — Elevation, shadows, motion
   Soft, low, neutral-violet shadows. No harsh black.
   ============================================================ */
:root {
  /* ---- Shadows -------------------------------------------- */
  --shadow-xs:  0 1px 2px rgba(36, 14, 61, 0.06);
  --shadow-sm:  0 1px 3px rgba(36, 14, 61, 0.08), 0 1px 2px rgba(36, 14, 61, 0.05);
  --shadow-md:  0 4px 12px rgba(36, 14, 61, 0.08), 0 2px 4px rgba(36, 14, 61, 0.05);
  --shadow-lg:  0 12px 28px rgba(36, 14, 61, 0.12), 0 4px 8px rgba(36, 14, 61, 0.06);
  --shadow-xl:  0 24px 48px rgba(36, 14, 61, 0.16);
  --shadow-brand: 0 8px 24px rgba(74, 32, 120, 0.28);
  --shadow-inset: inset 0 1px 2px rgba(36, 14, 61, 0.08);

  /* ---- Focus ring ----------------------------------------- */
  --focus-ring: 0 0 0 3px var(--ring-focus);

  /* ---- Motion --------------------------------------------- */
  --ease-out:    cubic-bezier(0.22, 1, 0.36, 1); /* @kind other */
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1); /* @kind other */
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1); /* @kind other */
  --dur-fast:    120ms; /* @kind other */
  --dur-base:    200ms; /* @kind other */
  --dur-slow:    320ms; /* @kind other */

  /* ---- Z-index -------------------------------------------- */
  --z-base:    1;    /* @kind other */
  --z-sticky:  100;  /* @kind other */
  --z-overlay: 1000; /* @kind other */
  --z-modal:   1100; /* @kind other */
  --z-toast:   1200; /* @kind other */
  --z-tooltip: 1300; /* @kind other */
}


  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { font-family: var(--font-body); background: var(--surface-page); color: var(--text-primary);
    -webkit-font-smoothing: antialiased; }
  .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  #root { max-width: var(--container-max); margin: 0 auto; padding: 22px 28px 40px; }

  /* ---------- Header ---------- */
  .va-header { display: flex; align-items: center; justify-content: space-between; gap: 20px;
    padding: 6px 2px 18px; }
  .va-brand { display: flex; align-items: center; gap: 16px; }
  .va-crest-wrap { position: relative; cursor: pointer; user-select: none; }
  .va-crest { width: 54px; height: 54px; display: block; transition: transform var(--dur-base) var(--ease-spring); }
  .va-crest-wrap:active .va-crest { transform: scale(0.92); }
  .va-ball { position: absolute; top: -8px; right: -10px; font-size: 20px; opacity: 0; pointer-events: none; }
  .va-ball.go { animation: va-roll 900ms var(--ease-out); }
  @keyframes va-roll { 0% { opacity: 1; transform: rotate(0) translateY(0); } 100% { opacity: 0; transform: rotate(900deg) translateY(-6px); } }
  .va-1926 { position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%) translateY(3px);
    font: var(--fw-bold) 8px var(--font-mono); letter-spacing: .12em; color: var(--giglio-500);
    opacity: 0; transition: all var(--dur-base) var(--ease-out); white-space: nowrap; }
  .va-crest-wrap:hover .va-1926 { opacity: 1; transform: translateX(-50%) translateY(0); }
  .va-word-v { font: var(--fw-bold) 24px/1 var(--font-display); letter-spacing: var(--ls-tight); color: var(--viola-800); }
  .va-word-v span { color: var(--accent-600); }
  .va-word-a { font: var(--fw-medium) 11px var(--font-mono); letter-spacing: .04em; color: var(--text-muted); margin-top: 5px; }
  .va-pill-file { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px;
    background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-pill);
    box-shadow: var(--shadow-xs); font-size: var(--text-xs); color: var(--text-secondary); }
  .va-pill-file .mono { color: var(--text-primary); }
  .va-sep { color: var(--border-strong); }
  .va-dot-live { width: 8px; height: 8px; border-radius: 50%; background: var(--positive-500);
    box-shadow: 0 0 0 3px var(--positive-100); animation: va-pulse 2s var(--ease-in-out) infinite; }
  @keyframes va-pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

  /* ---------- Upload ---------- */
  .va-upload { margin-bottom: 18px; }

  /* ---------- Empty state ---------- */
  .va-empty { text-align: center; padding: 56px 20px 64px; max-width: 560px; margin: 0 auto; }
  .va-empty-icon { font-size: 42px; margin-bottom: 8px; }
  .va-empty h2 { font: var(--type-h1); color: var(--text-primary); margin: 0 0 12px; }
  .va-empty p { font-size: var(--text-base); line-height: var(--lh-normal); color: var(--text-secondary); margin: 0 auto 22px; }
  .va-empty-cols { margin-top: 26px; font-size: 11px; color: var(--text-muted); line-height: 1.8;
    background: var(--surface-sunken); border-radius: var(--radius-md); padding: 12px 16px; }

  /* ---------- Filters ---------- */
  .va-filters { background: var(--surface-card); border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 18px 20px; margin-bottom: 22px; }
  .va-filters-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 18px 22px; align-items: end; }
  .va-filters-foot { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-subtle); }

  /* ---------- Grid ---------- */
  .va-grid { display: grid; grid-template-columns: minmax(0, 1.08fr) minmax(0, 1fr); gap: 22px; align-items: start; }
  .va-noresult { background: var(--warning-100); border: 1px solid #F2DBA6; color: #7a5300;
    border-radius: var(--radius-lg); padding: 18px 20px; font-size: var(--text-sm); }

  /* ---------- Ranking ---------- */
  .va-help-inline { font: var(--fw-semibold) var(--text-sm) var(--font-body); color: var(--text-secondary);
    display: inline-flex; align-items: center; gap: 5px; }
  .va-rank-controls { display: flex; align-items: center; gap: 14px; margin: 16px 0 6px; }
  .va-rank-controls > div { flex: 1; }
  .va-per90-tag { font-size: 10px; color: var(--accent-600); background: var(--accent-soft);
    padding: 3px 8px; border-radius: var(--radius-pill); font-weight: 600; }
  .va-chart { position: relative; margin: 6px 0 4px; }
  .va-rank-table { margin-top: 8px; border-top: 1px solid var(--border-subtle); }
  .va-cap { font-size: var(--text-xs); color: var(--text-muted); line-height: var(--lh-normal); margin: 12px 0 0; }

  /* ---------- Player card ---------- */
  .va-kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .va-pitch-block { }
  .va-pitch-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .va-pitch-head h4 { margin: 0; font: var(--type-card-title); color: var(--text-primary); }
  .va-pitch-foot { margin-top: 12px; }
  .va-pitch-foot .va-cap b { color: var(--text-secondary); }

  /* ---------- Footer ---------- */
  .va-foot { margin-top: 34px; padding-top: 16px; border-top: 1px solid var(--border-subtle);
    font-size: 11px; color: var(--text-muted); text-align: center; }
  .va-foot-egg { color: var(--giglio-500); cursor: help; }

  @media (max-width: 1000px) {
    .va-grid { grid-template-columns: 1fr; }
    .va-filters-grid { grid-template-columns: repeat(2, 1fr); }
    .va-kpis { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 560px) {
    #root { padding: 16px 14px 32px; }
    .va-filters-grid, .va-kpis { grid-template-columns: 1fr; }
    .va-header { flex-direction: column; align-items: flex-start; gap: 12px; }
  }
</style></head><body>
